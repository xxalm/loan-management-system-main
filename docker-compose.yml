services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fundo-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - fundo-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundo-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=FundoLoanDb;User Id=sa;Password=YourStrong@Passw0rd123;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  fundo-sqlserver-data:
