<mat-progress-bar
  *ngIf="isNavigating"
  mode="indeterminate"
  class="route-progress"
></mat-progress-bar>

<mat-sidenav-container
  class="app-container"
  [class.app-container--authenticated]="showSidenav"
>
  <mat-sidenav
    *ngIf="showSidenav"
    class="app-sidenav"
    mode="side"
    opened
    fixedInViewport
  >
    <div class="sidenav-header">
      <div class="sidenav-brand">
        <mat-icon class="brand-icon">account_balance</mat-icon>
        <span class="brand-name">Fundo Loans</span>
      </div>

      <button
        mat-icon-button
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.isDarkTheme() ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        <mat-icon>{{ themeService.isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>

    <mat-nav-list class="sidenav-nav">
      <a
        mat-list-item
        routerLink="/loans"
        routerLinkActive="active-nav-item"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard / Loans</span>
      </a>

      <a
        mat-list-item
        routerLink="/loans/new"
        routerLinkActive="active-nav-item"
      >
        <mat-icon matListItemIcon>add_circle</mat-icon>
        <span matListItemTitle>New Application</span>
      </a>

      <a
        mat-list-item
        routerLink="/settings"
        routerLinkActive="active-nav-item"
      >
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <div class="user-info">
        <mat-icon>person</mat-icon>
        <span>{{ authService.getUsername() }}</span>
      </div>
      <button mat-stroked-button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
